# Welcome to Jekyll!

# Website settings
title: Luis Larota, MSc
description: Luis's blog,use Jekyll and github pages.
keywords: ""
baseurl: ""  # if you have suburl as homepage like '/homepage', please change it to '/homepage' and your repo's name should be 'homepage'
url: https://luisflarota.github.io  # url should be 'http://<github_username>.github.io/homepage' as before
# url: http://127.0.0.1:4000
img_path: static/assets/img  # url should be '/homepage/static/assets/img/blog' as before

# author -- index page "about me" section
author:  # change following line to your infomation.
  name: Luis Larota  # Be used at blog posts' author.
  first_name: Luis  # Be used at index page about me section.
  last_name: Larota  # Be used at index page about me section.
  avatar: /static/assets/img/landing/foto_2.jpg  # upload your avatar at directory and edit it.
  linkedin_id: lflarota # Leave blank if you don't have now
  cv: /static/assets/pdf/0823Resume Luis Larota.pdf 
  # twitter_username:   # Leave blank if you don't have now
  email: fernando.larota@gmail.com  # Leave blank if you don't have now
  github_username: luisflarota  # Leave blank if you don't have now
   # An online CV can be printed as PDF, leave blank if you don't have now
  # skill icons are on avatar's left and right side. Reference urls are http://fontawesome.io/ and http://fizzed.com/oss/font-mfizz
  skill_icon1:
    - name: icon-python
    - name: icon-mssql
  skill_icon2:
    - name: icon-git
    - name: icon-cplusplus
  desc: "Luis is a dynamic mining engineering professional and data enthusiast based in San Francisco, CA. With a solid foundation in responsible sourcing, mine planning, and data science, Luis has a track record of driving operational excellence in the extractive industries and startups. His expertise spans fleet management systems, data visualization, software development, and applied research across the mining value chain. With a Master's degree in Mining Engineering from the South Dakota School of Mines & Technology, Luis combines mining knowledge with technical prowess to innovate and optimize mining operations."
